claude:
  model: gemini-2.5-flash
  # flash-lite: ~2x faster first-token on the structured JSON classification
  # (the biggest fixed cost of every turn). Replies stay on full flash.
  # Revert to gemini-2.5-flash if classification quality ever regresses.
  model_intent_classify: gemini-2.5-flash-lite
  model_logistics: gemini-2.5-flash
  max_tokens_classify: 512
  max_tokens_respond: 600
  max_tokens_critique: 256
  max_tokens_logistics: 200

catalog_agent:
  max_reflection_rounds: 3
  search_top_k: 8
  max_products_after_filter: 10

short_term_memory:
  max_turns: 10

lt_memory:
  embedding_model: "gemini-embedding-001"
  search_top_k: 10

qdrant:
  collection_name: "kapruka_catalog"
  embedding_dim: 768   # gemini-embedding-001 truncated to 768 dims
  timeout: 30

ingest:
  catalog_path: "data/catalog.json"
  embedding_model: "gemini-embedding-001"
  batch_size: 100
